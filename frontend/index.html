<!DOCTYPE html> 
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>DrivePrep by Connie</title>
    <link rel="stylesheet" href="../frontend/styles.css">
</head>
<body>

<header class="navbar">

    <!-- LOGO -->
    <div class="logo">
        <img src="../assets/eeee.png" alt="Logo Connie" class="logo-img">
        <span class="logo-text">DrivePrep</span>
    </div>

    <!-- NAV DERECHA -->
    <div class="nav-right">

        <button id="btn-login" class="nav-btn">Iniciar sesión</button>
        <button id="btn-register" class="nav-btn">Registrarse</button>

        <div id="nav-usuario" style="display:none;">
            <span id="user-name"></span>
            <button id="logout-btn" class="nav-btn logout">Cerrar sesión</button>
        </div>

    </div>

</header>

<div id="toast" class="toast"></div>

<main class="dashboard">

    <section class="card">
        <h2>Exámenes</h2>
        <div class="card-content">
            <a href="examen.html" class="btn disabled">🔒 Diagnóstico</a>
            <a href="examen.html" class="btn disabled">🔒 Random</a>
            <a href="examen.html" class="btn disabled">🔒 Difícil</a>
        </div>
    </section>

    <section class="card">
        <h2>Manual</h2>
        <div class="card-content">
            <a href="manual.html" class="btn">Leer Manual</a>
        </div>
    </section>

</main>


<div id="modal-login" class="modal">
    <div class="modal-content">
        <span id="close-modal">&times;</span>
        
        <h2 id="form-title">Iniciar sesión</h2>

        <!-- SOLO REGISTRO -->
        <input type="text" placeholder="Nombre" id="register-nombre" style="display:none;">

        <!-- AMBOS -->
        <input type="email" placeholder="Correo" id="form-email">
        <input type="password" placeholder="Contraseña" id="form-password">

        <button id="submit-btn">Entrar</button>

        <p id="toggle-form" style="cursor:pointer; margin-top:10px;">
            ¿No tienes cuenta? Regístrate
        </p>
    </div>
</div>

<script src="../backend/login.js"></script>

</body>
</html>
