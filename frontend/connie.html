<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DrivePrep | Pregúntale a Connie</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Nunito', sans-serif;
            background: #F5E6D3;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* HEADER */
        .chat-header {
            background: linear-gradient(135deg, #C4B0E0, #9C7FD4);
            height: 68px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            flex-shrink: 0;
            position: relative;
            z-index: 10;
        }

        /* Borde dentado debajo del header */
        .chat-header::after {
            content: '';
            position: absolute;
            bottom: -13px;
            left: 0; right: 0;
            height: 14px;
            background:
                linear-gradient(135deg, #B39DDB 25%, transparent 25%) -10px 0,
                linear-gradient(225deg, #B39DDB 25%, transparent 25%) -10px 0,
                linear-gradient(315deg, #B39DDB 25%, transparent 25%),
                linear-gradient(45deg,  #B39DDB 25%, transparent 25%);
            background-size: 20px 14px;
        }

        .menu-btn {
            background: rgba(255,255,255,0.25);
            border: none;
            border-radius: 20px;
            padding: 8px 16px;
            color: white;
            font-family: 'Nunito', sans-serif;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .menu-btn:hover { background: rgba(255,255,255,0.38); }

        .header-title {
            display: flex;
            align-items: center;
            gap: 12px;
            color: white;
            font-weight: 800;
            font-size: 20px;
        }

        .header-avatar {
            width: 38px; height: 38px;
            border-radius: 50%;
            background: rgba(255,255,255,0.3);
            border: 2px solid rgba(255,255,255,0.6);
            display: flex; align-items: center; justify-content: center;
            font-size: 20px;
        }

        /* MENSAJES */
        .chat-body {
            flex: 1;
            overflow-y: auto;
            padding: 28px 20px 16px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            margin-top: 4px;
        }

        .chat-body::-webkit-scrollbar { width: 4px; }
        .chat-body::-webkit-scrollbar-thumb { background: rgba(196,176,224,0.5); border-radius: 4px; }

        .msg-row {
            display: flex;
            align-items: flex-end;
            gap: 10px;
            animation: fadeUp 0.25s ease forwards;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .msg-row.user {
            flex-direction: row-reverse;
        }

        .msg-avatar {
            width: 36px; height: 36px;
            border-radius: 50%;
            background: #C4B0E0;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
            margin-bottom: 2px;
        }

        .bubble {
            max-width: 68%;
            padding: 12px 16px;
            border-radius: 20px;
            font-size: 15px;
            line-height: 1.55;
            font-weight: 500;
            word-break: break-word;
        }

        .bubble.connie {
            background: white;
            color: #3D2C5E;
            border-bottom-left-radius: 5px;
            box-shadow: 0 2px 8px rgba(156,127,212,0.12);
        }

        .bubble.user {
            background: linear-gradient(135deg, #C4B0E0, #9C7FD4);
            color: white;
            border-bottom-right-radius: 5px;
            box-shadow: 0 2px 8px rgba(156,127,212,0.2);
        }

        /* Puntitos de escritura */
        .typing span {
            display: inline-block;
            width: 7px; height: 7px;
            border-radius: 50%;
            background: #B39DDB;
            margin: 0 2px;
            animation: bounce 1.1s infinite;
        }
        .typing span:nth-child(2) { animation-delay: 0.18s; }
        .typing span:nth-child(3) { animation-delay: 0.36s; }

        @keyframes bounce {
            0%, 60%, 100% { transform: translateY(0); }
            30%            { transform: translateY(-5px); }
        }

        /* INPUT */
        .chat-input-area {
            padding: 12px 20px 20px;
            flex-shrink: 0;
        }

        .input-wrapper {
            max-width: 700px;
            margin: 0 auto;
            background: white;
            border-radius: 28px;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 8px 8px 18px;
            box-shadow: 0 4px 16px rgba(156,127,212,0.18);
            border: 1.5px solid rgba(196,176,224,0.4);
        }

        .input-wrapper:focus-within {
            border-color: #B39DDB;
        }

        #user-input {
            flex: 1;
            border: none;
            outline: none;
            font-family: 'Nunito', sans-serif;
            font-size: 15px;
            font-weight: 500;
            color: #3D2C5E;
            background: transparent;
        }

        #user-input::placeholder { color: #C4B0E0; }

        .send-btn {
            width: 40px; height: 40px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(135deg, #C4B0E0, #9C7FD4);
            color: white;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
            font-size: 18px;
            transition: transform 0.15s;
        }
        .send-btn:hover  { transform: scale(1.08); }
        .send-btn:active { transform: scale(0.95); }
        .send-btn:disabled { opacity: 0.5; cursor: default; transform: none; }
    </style>
</head>
<body>

    <header class="chat-header">
        <a href="/" class="menu-btn">🏠 Menú</a>
        <div class="header-title">
            <div class="header-avatar">🚗</div>
            Pregúntale a Connie
        </div>
        <div style="width:100px"></div>
    </header>

    <div class="chat-body" id="chat-body">
        <div class="msg-row">
            <div class="msg-avatar">🚗</div>
            <div class="bubble connie">¡Hola! Soy tu asistente virtual de autoescuela retro. ¿En qué puedo ayudarte hoy?</div>
        </div>
    </div>

    <div class="chat-input-area">
        <div class="input-wrapper">
            <input type="text" id="user-input" placeholder="Pregúntale algo a Connie…" autocomplete="off">
            <button class="send-btn" id="send-btn" onclick="sendMessage()">➤</button>
        </div>
    </div>

    <script>
        const input = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const chatBody = document.getElementById('chat-body');

        input.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') sendMessage();
        });

        function addBubble(text, role) {
            const row = document.createElement('div');
            row.className = 'msg-row ' + (role === 'user' ? 'user' : '');

            if (role === 'connie') {
                const av = document.createElement('div');
                av.className = 'msg-avatar';
                av.textContent = '🚗';
                row.appendChild(av);
            }

            const bubble = document.createElement('div');
            bubble.className = 'bubble ' + role;
            bubble.textContent = text;
            row.appendChild(bubble);

            chatBody.appendChild(row);
            chatBody.scrollTop = chatBody.scrollHeight;
            return row;
        }

        function addTyping() {
            const row = document.createElement('div');
            row.className = 'msg-row';
            row.id = 'typing-row';

            const av = document.createElement('div');
            av.className = 'msg-avatar';
            av.textContent = '🚗';
            row.appendChild(av);

            const bubble = document.createElement('div');
            bubble.className = 'bubble connie typing';
            bubble.innerHTML = '<span></span><span></span><span></span>';
            row.appendChild(bubble);

            chatBody.appendChild(row);
            chatBody.scrollTop = chatBody.scrollHeight;
        }

        function removeTyping() {
            const t = document.getElementById('typing-row');
            if (t) t.remove();
        }

        async function sendMessage() {
            const text = input.value.trim();
            if (!text) return;

            input.value = '';
            sendBtn.disabled = true;
            addBubble(text, 'user');
            addTyping();

            try {
                const res = await fetch('/api/connie', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text })
                });
                const data = await res.json();
                removeTyping();
                addBubble(data.reply, 'connie');
            } catch (err) {
                removeTyping();
                addBubble('Ay, algo falló 😅 Intenta de nuevo.', 'connie');
            }

            sendBtn.disabled = false;
            input.focus();
        }
    </script>

</body>
</html>
